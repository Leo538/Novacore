<section id="blog-home" class="blog-carousel reveal" data-nav="theme-light">
  <h2 class="section-title">Blog técnico</h2>
  <p class="blog-carousel-subtitle">
    Un vistazo rápido a lo que estamos escribiendo: arquitectura, calidad y learning de proyectos reales.
  </p>

  @if (posts.length === 0) {
    <div class="blog-empty-state">
      <p class="blog-empty-text">Aún no hay entradas en el blog.</p>
      <p class="blog-empty-sub">Cuando se publiquen, aparecerán aquí en el carrusel.</p>
      <app-button variant="primary" (click)="goToBlog()">Ir al blog</app-button>
    </div>
  } @else {
    <div class="swiper-container-wrapper">
      <div class="swiper blogSwiper">
        <div class="swiper-wrapper">
          @for (post of posts; track post.id) {
            <div class="swiper-slide">
              <app-card
                [imageUrl]="post.imageUrl || defaultImage"
                [imageAlt]="post.imageAlt || post.title"
                [title]="post.title"
                [description]="post.excerpt"
                [price]="(post.publishedAt | date: 'd MMM y') || ''"
                [authors]="post.authors || []"
                [showButton]="true"
                buttonText="Ver más"
                [buttonLink]="'/blog/post/' + post.id"
              />
            </div>
          }
        </div>
      </div>

      <div class="swiper-button-next blog-swiper-button-next"></div>
      <div class="swiper-button-prev blog-swiper-button-prev"></div>
      <div class="swiper-pagination blog-swiper-pagination"></div>
    </div>
  }
</section>
